<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Precision Student Management System" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Student Registry" />
    <title>Student Registry</title>
    <script>
      // Aggressively unregister any service workers and clear caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          if (registrations.length > 0) {
            console.warn('Found active service workers, unregistering...');
            Promise.all(registrations.map(r => r.unregister())).then(() => {
              console.log('All service workers unregistered. Reloading page...');
              window.location.reload();
            });
          }
        });
      }
      
      // Clear caches to prevent stale assets
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
    </script>
    <script>
      // Suppress Vite HMR connection errors in preview environment
      // We suppress all console methods because Vite can be noisy in the preview iframe
      const suppressVite = (args) => {
        if (!args || !args.length) return false;
        
        for (let i = 0; i < args.length; i++) {
            const arg = args[i];
            if (typeof arg === 'string') {
                if (arg.includes('[vite]') || 
                    arg.includes('Refresh Token') || 
                    arg.includes('JWT')) {
                  return true;
                }
            }
            if (arg instanceof Error) {
                if (arg.message && (
                    arg.message.includes('[vite]') || 
                    arg.message.includes('Refresh Token') || 
                    arg.message.includes('JWT')
                )) {
                  return true;
                }
            }
        }
        return false;
      };

      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (suppressVite(args)) return;
        originalConsoleError.apply(console, args);
      };
      
      const originalConsoleWarn = console.warn;
      console.warn = function(...args) {
        if (suppressVite(args)) return;
        originalConsoleWarn.apply(console, args);
      };

      const originalConsoleLog = console.log;
      console.log = function(...args) {
        if (suppressVite(args)) return;
        originalConsoleLog.apply(console, args);
      };

      const originalConsoleInfo = console.info;
      console.info = function(...args) {
        if (suppressVite(args)) return;
        originalConsoleInfo.apply(console, args);
      };

      const originalConsoleDebug = console.debug;
      console.debug = function(...args) {
        if (suppressVite(args)) return;
        originalConsoleDebug.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
